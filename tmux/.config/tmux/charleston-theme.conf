bg="#1D2024"
default_fg="#acbcc3" 
session_fg="#EFC986"
session_selection_fg="#ffffff"
session_selection_bg="#30353b"
active_window_fg="#ffffff"
active_pane_border="#88ABDC"
mode_vi_selection_bg="#3e4452"
mode_vi_selection_fg="#C5C8D3"

set -g status-left-length 200   # default: 10
set -g status-right-length 200  # default: 10
set -g status-left "#[fg=${session_fg},bg=${bg}] #S"
set -g @kbd-layout-format '#[fg=yellow]#{value}#[fg=default]'
set -g @which-key-popup-bg 'bg=${bg}'
set -g status-right "#{?client_prefix,#[fg=yellow]▼,#[fg=${bg}]▼}#[fg=default] ⌨ #{kbd_layout} |  #{cpu -i 3} |  #{mem}"
set -g status-justify centre
set -g status-style "bg=${bg}"
set -g window-status-format "#[fg=${default_fg},bg=default] #I:#W"
set -g window-status-current-format "#[fg=${active_window_fg},bg=default]  #I:#W#{?window_zoomed_flag,🔎,}"
set -g window-status-last-style "fg=${default_fg},bg=default"
set -g message-command-style "bg=default,fg=${default_fg}"
set -g message-style "bg=default,fg=${default_fg}"
set -g mode-style "bg=${mode_vi_selection_bg},fg=${mode_vi_selection_fg}"
set -g pane-active-border-style "fg=${active_pane_border},bg=default,bold"
set -g pane-border-style "fg=brightblack,bg=default"
